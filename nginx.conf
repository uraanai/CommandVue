# =============================================================================
# CommandVue nginx vhost
# Drops into /etc/nginx/conf.d/default.conf inside the runtime image.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # Compression — Vite emits highly compressible JS / CSS / SVG. Gzip is fine
    # for most deployments; for edge / CDN setups consider brotli upstream.
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Security headers (sensible defaults, tighten per deployment).
    # Content-Security-Policy is intentionally omitted — it must be tailored to
    # the consumer's backends, CDNs, and embedded services. Add it here when
    # those are known. Suggested baseline for a self-contained build:
    #   add_header Content-Security-Policy
    #     "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';
    #      img-src 'self' data: https://tiles.openfreemap.org;
    #      connect-src 'self' https://tiles.openfreemap.org wss:;"
    #     always;
    # ---------------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

    # ---------------------------------------------------------------------------
    # Long-cache content-hashed assets. Vite writes `assets/*.{js,css,woff2}`
    # with hashes in the filename, so a one-year cache is safe.
    # ---------------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    # Cesium runtime assets are likewise immutable per version.
    location /cesium/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    # ---------------------------------------------------------------------------
    # Entry HTML must never be cached — it carries the manifest of hashed
    # asset URLs and needs to refresh on every deploy.
    # ---------------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # ---------------------------------------------------------------------------
    # SPA fallback — Vue Router runs in history mode, so deep-link URLs must
    # resolve to index.html and let the client take over.
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hide the nginx version in error pages / Server header.
    server_tokens off;
}
