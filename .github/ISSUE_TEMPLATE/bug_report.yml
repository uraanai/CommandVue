name: Bug report
description: Report a defect in CommandVue
title: "fix: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in the fields below.
  - type: input
    id: version
    attributes:
      label: CommandVue version or commit SHA
      placeholder: e.g., 0.1.0 or abc1234
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the bug.
      placeholder: |
        1. Open the app
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser + OS + Node version
      placeholder: e.g., Chrome 130 on Windows 11, Node 22.12.0
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Browser console output
      description: Paste any relevant errors from the browser devtools console.
      render: shell
