name: Feature request
description: Suggest an enhancement to CommandVue
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing need, not the implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should CommandVue do? Optional — leave blank if you only want to surface the problem.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you preferred the proposal.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: CommandVue is a template. Domain-specific features belong in downstream forks, not the template.
      options:
        - label: This is a general-purpose template improvement, not a domain-specific feature
          required: true
