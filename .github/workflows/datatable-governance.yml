name: DataTable governance

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flag-primevue-datatable:
    name: Flag primevue/datatable usage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect primevue/datatable in PR diff
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Grep added lines (lines starting with "+", excluding the diff header "+++")
          # in changed Vue/TS/JS files for the import path. Detects both ESM and CJS
          # forms (import ... from "primevue/datatable" / require("primevue/datatable")).
          if git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" -- '*.vue' '*.ts' '*.tsx' '*.js' '*.jsx' \
            | grep -E '^\+[^+]' \
            | grep -qE 'primevue/datatable'; then
            echo "has_usage=true" >> "$GITHUB_OUTPUT"
            echo "PR diff introduces or touches a primevue/datatable import."
          else
            echo "has_usage=false" >> "$GITHUB_OUTPUT"
            echo "No primevue/datatable usage in PR diff."
          fi

      - name: Apply governance label
        if: steps.detect.outputs.has_usage == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --add-label "governance: primevue-datatable"
